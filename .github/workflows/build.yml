name: Build and Release

# Tag-driven release: push a v* tag to build all platform/arch targets and attach the artifacts + SHA-256 checksums to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — NSIS installer only
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: win-x64
            bundles: '--bundles nsis'
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_name: win-arm64
            bundles: '--bundles nsis'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync version from tag
        shell: bash
        run: |
          # Tag e.g. v1.2.0 → version 1.2.0 in package.json + Cargo.toml + tauri.conf.json.
          # Tauri reads the bundle version from tauri.conf.json, so it must be patched
          # too — otherwise the installer filenames keep the stale version even though
          # package.json and Cargo.toml were updated.
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
          sed -i.bak 's/"version": *"[^"]*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Artefact Cataloguer ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your architecture below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} ${{ matrix.bundles }}

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          # tauri-action writes artifacts to src-tauri/target/release/bundle/.
          cd src-tauri/target/*/release/bundle 2>/dev/null || exit 0
          find . -type f -name "*.exe" -exec openssl dgst -sha256 -r {} \; > "${{ matrix.artifact_name }}-checksums.txt"
          cat "${{ matrix.artifact_name }}-checksums.txt"

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-checksums
          path: |
            src-tauri/target/*/release/bundle/*-checksums.txt
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo ${{ github.repository }} --draft=false
